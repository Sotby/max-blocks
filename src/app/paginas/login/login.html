<main>  
      <app-banner-lateral></app-banner-lateral>
      <!-- Painel Direita -->
      <a href="Inicio" class="logo-cell">Max<Span>Block</Span></a>
      <div class="painel-direita">
          <div class="login-form-card card-brilho">

            <!-- Subtítulo -->
            <p class="login-subtitulo">Entre com sua conta, jogador!</p>
            
            <!-- Formulário de Login -->
            <form class="login-form" action="#">
              
              <!-- Campo E-mail -->
              <div class="campo-grupo">
                <label class="campo-label" for="email">E-mail</label>
                <input
                  class="campo-input"
                  type="email"
                  id="email"
                  name="email"
                  placeholder="seu@email.com"
                  required
                />
              </div>
              
              <!-- Campo Senha -->
              <div class="campo-grupo">
                <label class="campo-label" for="senha">Senha</label>
                <input
                  class="campo-input"
                  type="password"
                  id="senha"
                  name="senha"
                  placeholder="••••••••"
                  required
                />
                <a href="#" class="login-esqueceu">Esqueceu a senha?</a>
              </div>
              <!-- Botão de Login -->
              <button class="btn-primario login-btn-submit" type="submit">
                Entrar na conta <i class="fas fa-sign-in-alt"></i>
              </button>
            </form>
            
            <!-- Link para Cadastro -->
            <p class="login-cadastro-link">
              Ainda não tem conta? <a href="Cadastro">Criar conta grátis</a>
            </p>
          </div>
        </div>   
</main>
