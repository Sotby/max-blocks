<main>
  <div class="login-pagina">
      <div class="login-painel fundo-pontos">
      <div class="painel-esquerda">
        <a href="../../index.html" id="logo">Max<span>Block</span></a>
        <div>
          <div class="linha-acento"></div>
          <h2 class="login-frase">Bem-vindo jogador!</h2>
        </div>
        <p class="login-rodape-painel">O sit de jogos mais divertido do universo!</p>
      </div>
      <div class="painel-direita">
        <div class="login-painel">
          <div class="login-form-card card-brilho">
            <p class="login-subtitulo">Entre com sua conta, jogador</p>
            <form class="login-form" action="#">
  
              <div class="campo-grupo">
           
                <label class="campo-label" for="email">E-mail</label>
                <input
                  class="campo-input"
                  type="email"
                  id="email"
                  name="email"
                  placeholder="seu@email.com"
                  required
                />
              </div>
  
              <div class="campo-grupo">
                <label class="campo-label" for="senha">Senha</label>
                <input
                  class="campo-input"
                  type="password"
                  id="senha"
                  name="senha"
                  placeholder="••••••••"
                  required
                />
                <a href="#" class="login-esqueceu">Esqueceu a senha?</a>
              </div>
  
              <button class="btn-primario login-btn-submit" type="submit">
                Entrar na conta <i class="fas fa-sign-in-alt"></i>
              </button>
  
            </form>
  
            <p class="login-cadastro-link">
              Ainda não tem conta? <a href="../cadastro/cadastro.html">Criar conta grátis</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>      
</main>
