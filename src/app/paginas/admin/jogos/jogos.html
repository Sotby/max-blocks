<div class="adm-app">
  <app-admin-sidebar></app-admin-sidebar>
  <!-- CONTEÚDO -->
  <main class="adm-conteudo">
    <div class="adm-cabecalho-pagina">
      <div>
        <h1 class="adm-titulo-pagina">Jogos</h1>
        <p class="adm-subtitulo">Gerencie o catálogo de jogos da plataforma</p>
      </div>
    </div>

    <!-- LISTAGEM -->
    <div class="adm-secao titulo">
      <div class="adm-secao-header">
        <h2 class="adm-secao-titulo">Catálogo de jogos</h2>
      </div>
      <!-- FILTROS -->
      <div class="adm-secao tabela">
        <form class="filtros-barra" id="form-filtros" [formGroup]="filterForm">
          <div class="filtro-grupo">
            <label for="filtro-id">ID</label>
            <input
              class="filtro-input"
              type="number"
              id="filtro-id"
              placeholder="Ex: 021"
              style="min-width: 90px"
              formControlName="gameId"
            />
          </div>
          <div class="filtro-grupo">
            <label for="filtro-nome">Nome do jogo</label>
            <input
              class="filtro-input"
              type="text"
              id="filtro-nome"
              placeholder="Buscar por nome..."
              formControlName="gameName"
            />
          </div>
          <div class="filtro-grupo">
            <label for="filtro-categoria">Categoria</label>
            <select class="filtro-select" id="filtro-categoria" formControlName="categoryId">
              <option value="">Todas</option>
              <option value="{{categoria.id}}" *ngFor="let categoria of categorias()">{{categoria.name}}</option>
            </select>
          </div>
          <div class="filtro-grupo">
            <button type="submit" class="btn-secundario">
              <i class="fas fa-filter"></i> Filtrar
            </button>
          </div>
        </form>
      </div>
      <div class="container-tabela">
        <table class="adm-tabela">
          <thead>
            <tr>
              <th>ID</th>
              <th>Nome</th>
              <th>Categoria</th>
              <th>Classificação</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let jogo of jogosFiltrados()">
              <td>{{jogo.id}}</td>
              <td>{{jogo.name}}</td>
              <td><span class="badge badge-categoria">{{jogo.category.name}}</span></td>
              <td><span class="badge badge-classificacao">{{jogo.ageRating}}</span></td>
              <td class="tabela-acoes">
                <div class="acoes">
                  <a class="btn-acao btn-editar-jogo" routerLink="/Admin/Jogos/Editar/{{jogo.id}}">Editar</a>
                  <button class="btn-acao-perigo" (click)="this.deletarJogo(jogo.id)">Excluir</button>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
    <div class="adm-secao form">
      <h1 class="adm-titulo-pagina">{{id ? "Atualizar Jogo" : "Cadastrar um Jogo"}}</h1>
      <form [formGroup]="jogosForm" (ngSubmit)="onSubmit()">
        <div class="input-group">
          <label for="">Imagem do Jogo</label>
          <div class="w-full max-h-96">
            <label
              for="image"
              class="group flex cursor-pointer items-center justify-center overflow-hidden rounded-xl border-2 border-dashed border-gray-300 bg-gray-100 transition hover:border-indigo-500 hover:bg-indigo-50"
            >
              @if (imagemPreview) {
                <img
                  [src]="imagemPreview"
                  alt="Preview"
                  class="h-full w-full max-h-96"
                />
              } @else {
                <div class="flex flex-col items-center gap-3 text-gray-500 group-hover:text-indigo-600">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    class="h-12 w-12"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M3 16l5-5a2 2 0 012.828 0L16 16m-2-2l1-1a2 2 0 012.828 0L21 16M14 7h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"
                    />
                  </svg>
          
                  <div class="text-center">
                    <p class="font-medium">Clique para escolher uma imagem</p>
                    <p class="text-sm text-gray-400">PNG, JPG ou WEBP</p>
                  </div>
                </div>
              }
            </label>
            <input
              id="image"
              type="file"
              accept="image/*"
              class="hidden"
              (change)="onFileChange($event)"
            />
          </div>
        </div>
        <div class="input-group">
          <label for="">Nome do Jogo</label>
          <input type="text" placeholder="Nome" formControlName="name" class="textinput"/>
        </div>
        <div class="input-group">
          <label for="">Descrição do Jogo</label>
          <input type="text" id="" formControlName="description" class="textinput" placeholder="Descrição">
        </div>
        <div class="selects">
          <div class="input-group">
            <label for="">Categorias</label> 
            <select name="" id="categoria" formControlName="categoryId">
              <option *ngFor="let categoria of categorias()" value="{{categoria.id}}">{{categoria.name}}</option>
            </select>
          </div>
          <div class="input-group">
            <label for="">Classificação Indicativa</label>
            <select name="" id="age" formControlName="ageRating">
              <option value="Livre">Livre</option>
              <option value="10+">10+</option>
              <option value="12+">12+</option>
              <option value="14+">14+</option>
              <option value="16+">16+</option>
              <option value="18+">18+</option>
            </select>
          </div>
          <div class="input-group">
            <label for="">Controles</label>
            <select name="" id="controls" formControlName="controls">
              <option value="Teclado">Teclado</option>
              <option value="TecladoMouse">Teclado e mouse</option>
              <option value="Mouse">Mouse</option>
              <option value="Controle">Controle</option>
            </select>
          </div>
        </div>
        <div class="input-group">
          <label for="">URL</label>
          <input type="text" placeholder="url" formControlName="gameUrl" class="textinput"/>
        </div>
        <button type="submit">
          @if(isLoading()){
            <div class="grid w-full h-full place-items-center overflow-x-scroll rounded-lg lg:overflow-visible">
              <svg class="text-gray-300 animate-spin" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"
                width="24" height="24">
                <path
                  d="M32 3C35.8083 3 39.5794 3.75011 43.0978 5.20749C46.6163 6.66488 49.8132 8.80101 52.5061 11.4939C55.199 14.1868 57.3351 17.3837 58.7925 20.9022C60.2499 24.4206 61 28.1917 61 32C61 35.8083 60.2499 39.5794 58.7925 43.0978C57.3351 46.6163 55.199 49.8132 52.5061 52.5061C49.8132 55.199 46.6163 57.3351 43.0978 58.7925C39.5794 60.2499 35.8083 61 32 61C28.1917 61 24.4206 60.2499 20.9022 58.7925C17.3837 57.3351 14.1868 55.199 11.4939 52.5061C8.801 49.8132 6.66487 46.6163 5.20749 43.0978C3.7501 39.5794 3 35.8083 3 32C3 28.1917 3.75011 24.4206 5.2075 20.9022C6.66489 17.3837 8.80101 14.1868 11.4939 11.4939C14.1868 8.80099 17.3838 6.66487 20.9022 5.20749C24.4206 3.7501 28.1917 3 32 3L32 3Z"
                  stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"></path>
                <path
                  d="M32 3C36.5778 3 41.0906 4.08374 45.1692 6.16256C49.2477 8.24138 52.7762 11.2562 55.466 14.9605C58.1558 18.6647 59.9304 22.9531 60.6448 27.4748C61.3591 31.9965 60.9928 36.6232 59.5759 40.9762"
                  stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" class="text-gray-900">
                </path>
              </svg>
            </div>
          }
          @else {
            @if(id){
              Atualizar Jogo
            } @else {
              Cadastrar
            }
          }
        </button>
      </form>
    </div>
  </main>
</div>
