<div class="adm-app">
  <!-- SIDEBAR -->
  <aside class="adm-sidebar">
    <p class="adm-sidebar-titulo">Menu</p>
    <a routerLink="/Admin/Geral" routerLinkActive="ativo" class="adm-sidebar-link">
      <i class="fas fa-chart-line"></i> Visão Geral
    </a>
    <a routerLink="/Admin/Jogos" routerLinkActive="ativo" class="adm-sidebar-link">
      <i class="fas fa-gamepad"></i> Jogos
    </a>
    <a routerLink="/Admin/Categorias" routerLinkActive="ativo" class="adm-sidebar-link">
      <i class="fas fa-tags"></i> Categorias
    </a>

    <p class="adm-sidebar-titulo">Conta</p>
    <a routerLink="/Perfil" class="adm-sidebar-link">
      <i class="fas fa-user-shield"></i> Perfil Admin
    </a>
    <button class="adm-sidebar-link" (click)="authservice.logout()">
      <i class="fas fa-sign-out-alt"></i> Sair
    </button>
  </aside>

  <!-- CONTEÚDO -->
  <main class="adm-conteudo">
    <div class="adm-cabecalho-pagina">
      <div>
        <h1 class="adm-titulo-pagina">Categorias</h1>
        <p class="adm-subtitulo">Organize os gêneros de jogos da plataforma</p>
      </div>
    </div>
    <div class="tabela">
      <!-- FILTROS -->
      <div class="adm-secao">
        <form class="filtros-barra" id="form-filtros">
          <div class="filtro-grupo">
            <label for="filtro-id">ID</label>
            <input
              class="filtro-input"
              type="number"
              id="filtro-id"
              placeholder="Ex: 04"
              style="min-width: 90px"
            />
          </div>
          <div class="filtro-grupo">
            <label for="filtro-nome">Nome da categoria</label>
            <input
              class="filtro-input"
              type="text"
              id="filtro-nome"
              placeholder="Buscar por nome..."
            />
          </div>
          <div class="filtro-grupo">
            <button type="submit" class="btn-secundario">
              <i class="fas fa-filter"></i> Filtrar
            </button>
          </div>
        </form>
      </div>
      <div class="adm-secao">
        <table class="adm-tabela">
          <thead>
            <tr>
              <th>ID</th>
              <th>Nome</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let categoria of categorias()">
              <td>{{categoria.id}}</td>
              <td>{{categoria.name}}</td>
              <td class="tabela-acoes">
                <div class="acoes">
                  <button class="btn-acao btn-editar-categoria">Editar</button>
                  <button class="btn-acao-perigo" (click)="this.deletarCategoria(categoria.id)">Excluir</button>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- LISTAGEM -->

    <div class="adm-secao form">
      <h1 class="adm-titulo-pagina">Cadastrar Categoria</h1>

      <form [formGroup]="categoriaform" (ngSubmit)="onSubmit()">
        <div class="input-group">
          <label>Imagem da Categoria</label>
          <input
            type="file"
            accept=".png,.jpg,.jpeg"
            class="input-image"
            (change)="onFileChange($event)"
          />
        </div>

        <div class="input-group">
          <label>Nome da Categoria</label>
          <input
            type="text"
            class="textinput"
            formControlName="name"
            placeholder="Nome da categoria"
          />
        </div>

        <button type="submit">Cadastrar</button>
      </form>
    </div>
  </main>
</div>
