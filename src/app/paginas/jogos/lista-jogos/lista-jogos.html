<app-nav-bar></app-nav-bar>
<main>
    <section id="search-filters">
        <div class="search">
            <input type="text" placeholder="Busque um jogo">
            <button type="submit">
                <i class="fa fa-search" aria-hidden="true"></i>
            </button>
        </div>
        <div class="filters">
            <select name="" id="">
                <option *ngFor="let categoria of categorias()" value="{{categoria.id}}">{{categoria.name}}</option>
            </select>
        </div>
    </section>
    <section id="games">
        <div class="game-container">
            <div class="game" *ngFor="let jogo of jogos()">
              <div class="game-image-container">
                  <img [src]="jogo.image_url" alt="" class="game-image" />
                  <span class="game-ageRating">{{jogo.ageRating}}</span>
              </div>
              <div class="game-text-container">
                  <div class="game-title">
                      <span class="game-name">{{jogo.name}}</span>
                      <span class="game-likes">
                        <button class="game-like-icon">
                          <i class="fa fa-thumbs-up" aria-hidden="true"></i>
                        </button>
                        {{jogo.likesCount}}
                      </span>
                    </div>
                    <div class="game-data-container">
                      <span class="game-category">
                          {{jogo.category.name}}
                      </span>
                      <span class="game-mapping">
                          Controles:
                          <span class="game-mapping-data">{{jogo.controls}}</span>
                      </span>
                    </div>
                    <p class="game-descricao">
                      {{jogo.description}}
                    </p>
              </div>
              <button class="game-play">Jogar</button>
            </div>
          </div>
    </section>
</main>
