  </section>
  <section id="dashboard">
    <div id="controls">
      <button>Configurações da conta</button>
      <button>Cadastrar um Jogo</button>
      <button>Criar uma categoria</button>
    </div>
    <div id="configuracoes" class="">
      <button (click)="authService.logout()">Sair</button>
    </div>
    <div id="cadastro-jogos" class="hidden">
      <form action="#">
        <div class="imagem-div">
          <input type="file" accept=".png,.jpg,.jpeg" id="imagem-jogo" class="input-img"/>
        </div>
        <div class="dados-div">
          <input type="text" placeholder="Nome" required class="input-txt"/>
          <input type="text" placeholder="Descrição" required class="input-txt"/>
          <div class="select-div">
            <div class="campo-grupo">
              <label for="categoria">Categoria</label>
              <select name="Categoria" id="categoria" required>
                <option value="Jogo">Teste</option>
              </select>
            </div>
            <div class="campo-grupo">
              <label for="classificacao-indicativa">Classificação indicativa</label>
              <select name="idade" id="age-rating" required></select>
            </div>
            <div class="campo-grupo">
              <label for="controles">Controles do jogo</label>
              <select name="controles-jogo" id="controles-jogo" required>
                <option value="keyboard">Teclado</option>
                <option value="keyboard-mouse">Teclado e mouse</option>
                <option value="controller">Controle</option>
              </select>
            </div>
          </div>
          <button type="submit">Cadastrar</button>
        </div>
      </form>
    </div>
    <div id="cadastro-categoria" class="hidden">
      <form action=""[formGroup]="cadastrarCategoriaForm" (ngSubmit)="onSubmit()">
        <input type="file" accept=".png,.jpg,.jpeg,.icon" id="Icone-categoria" required class="input-img" formControlName="image"/>
        <input type="text" required placeholder="Nome" class="input-txt" formControlName="name"/>
        <button type="submit">Cadastrar</button>
      </form>
    </div>
  </section>
</main>
