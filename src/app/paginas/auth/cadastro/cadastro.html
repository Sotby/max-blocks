<main class="body">
  <a href="Inicio" class="logo-cell">Max<Span>Block</Span></a>
  <div class="painel-direita">
    <div class="login-form-card card-brilho">
      <!-- Subtítulo -->
      <p class="login-subtitulo">Bem-vindo a família, jogador!</p>

      <!-- Formulário de Cadastro -->
      <form class="login-form" [formGroup]="cadastroForm" (ngSubmit)="onSubmit()">
        <!-- Campo E-mail -->
        <div class="campo-grupo">
          <label class="campo-label" for="username">Nome de usuário</label>
          <input
            class="campo-input"
            type="text"
            id="username"
            name="username"
            placeholder="SeuNome"
            formControlName="name"
            required
          />
        </div>
        <div class="campo-grupo">
          <label class="campo-label" for="email">E-mail</label>
          <input
            class="campo-input"
            type="email"
            id="email"
            name="email"
            placeholder="seu@email.com"
            formControlName="email"
            required
          />
        </div>

        <!-- Campo Senha -->
        <div class="campo-grupo">
          <label class="campo-label" for="senha" >Senha</label>
          <input
            class="campo-input"
            type="password"
            id="senha"
            name="senha"
            placeholder="••••••••"
            formControlName="password"
            required
          />
          <label for="conf-senha" class="campo-label">Confirmar a senha</label>
          <input
            class="campo-input"
            type="password"
            id="c_senha"
            name="c-senha"
            placeholder="••••••••"
            formControlName="c_password"
            required
          />
        </div>
        <div class="cadastro-termos">
          <input type="checkbox" id="termos" required />
          <label for="termos">
            Eu concordo com os <a href="#">Termos de Uso</a> e a
            <a href="#">Política de Privacidade</a> do MaxBlock.
          </label>
        </div>
        <div class="error-specification">
          
        </div>
        <!-- Botão de Login -->
        <button class="btn-primario login-btn-submit" type="submit" [disabled]="cadastroForm.invalid" [class.disabled]="cadastroForm.invalid">
            @if(enviando()){
              <div class="grid w-full h-full place-items-center overflow-x-scroll rounded-lg lg:overflow-visible">
                <svg class="text-gray-300 animate-spin" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"
                  width="24" height="24">
                  <path
                    d="M32 3C35.8083 3 39.5794 3.75011 43.0978 5.20749C46.6163 6.66488 49.8132 8.80101 52.5061 11.4939C55.199 14.1868 57.3351 17.3837 58.7925 20.9022C60.2499 24.4206 61 28.1917 61 32C61 35.8083 60.2499 39.5794 58.7925 43.0978C57.3351 46.6163 55.199 49.8132 52.5061 52.5061C49.8132 55.199 46.6163 57.3351 43.0978 58.7925C39.5794 60.2499 35.8083 61 32 61C28.1917 61 24.4206 60.2499 20.9022 58.7925C17.3837 57.3351 14.1868 55.199 11.4939 52.5061C8.801 49.8132 6.66487 46.6163 5.20749 43.0978C3.7501 39.5794 3 35.8083 3 32C3 28.1917 3.75011 24.4206 5.2075 20.9022C6.66489 17.3837 8.80101 14.1868 11.4939 11.4939C14.1868 8.80099 17.3838 6.66487 20.9022 5.20749C24.4206 3.7501 28.1917 3 32 3L32 3Z"
                    stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"></path>
                  <path
                    d="M32 3C36.5778 3 41.0906 4.08374 45.1692 6.16256C49.2477 8.24138 52.7762 11.2562 55.466 14.9605C58.1558 18.6647 59.9304 22.9531 60.6448 27.4748C61.3591 31.9965 60.9928 36.6232 59.5759 40.9762"
                    stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" class="text-gray-900">
                  </path>
                </svg>
              </div>
            }
            @else {
              Criar conta <i class="fas fa-sign-in-alt"></i>
            }
        </button>
      </form>

      <!-- Link para Cadastro -->
      <p class="login-cadastro-link">
        Já possui uma conta? <a routerLink="/Login">Entrar na conta</a>
      </p>
    </div>
  </div>
  <app-banner-lateral></app-banner-lateral>
</main>
