<header class="logado">
  <a routerLink="/Inicio" id="logo">Max<span>Block</span></a>
  <div class="links">
    <nav>
      <ul>
        <li><a routerLink="/Inicio" routerLinkActive="ativo">Início</a></li>
        <li><a routerLink="/Sobre-Nos" routerLinkActive="ativo">Sobre</a></li>
        <li><a routerLink="/Jogos" routerLinkActive="ativo">Jogos</a></li>
        @if (authService.isLoggedIn()) {
          <li id="li-perfil">
            <a routerLink="/Perfil" id="perfil"
              ><img
                src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTvT4L1Y7FUT3vRpPLaUSNQs2KTh2Kp_Nc4aT6FGLriEA&s=10"
                alt=""
            /></a>
          </li>
        } @else {
          <li><a routerLink="/Login" id="login">Login</a></li>
        }
      </ul>
    </nav>
  </div>
</header>
